name: Deploy Agri-Price Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: "us-east-1"
  STACK_NAME: "agri-price-pipeline-stack"
  S3_BUCKET: "agri-price-dev-raw"
  ARTIFACT_BUCKET: "agri-artifacts"
  ARTIFACT_PREFIX: "lambda-artifacts"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate CloudFormation Template
        working-directory: ./infrastructure
        run: |
          aws cloudformation validate-template --template-body file://template.yaml

      - name: Zip Lambda functions
        run: |
          set -euo pipefail
          mkdir -p dist

          zip -r dist/agri-store-task-token.zip src/backend/agri-store-task-token
          zip -r dist/send_approval_request.zip src/backend/send_approval_request
          zip -r dist/agri-metrics-publisher.zip src/backend/agri-metrics-publisher
          zip -r dist/ingest_weather.zip src/backend/ingest_weather
          zip -r dist/agri-start-glue-transform.zip src/backend/agri-start-glue-transform
          zip -r dist/agri-approval-decision.zip src/backend/agri-approval-decision
          zip -r dist/agri-curate-predictions.zip src/backend/agri-curate-predictions
          zip -r dist/ingest_prices.zip src/backend/ingest_prices
          zip -r dist/agri-start-retraining.zip src/backend/agri-start-retraining
          zip -r dist/agri-daily-inference.zip src/backend/agri-daily-inference

      - name: Upload Lambda artifacts to S3
        run: |
          aws s3 cp dist/ s3://${{ env.ARTIFACT_BUCKET }}/${{ env.ARTIFACT_PREFIX }}/ --recursive

      - name: Deploy CloudFormation Stack
        working-directory: ./infrastructure
        run: |
          aws cloudformation deploy \
            --template-file template.yaml \
            --stack-name ${{ env.STACK_NAME }} \
            --capabilities CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides \
              ArtifactBucketName=${{ env.ARTIFACT_BUCKET }} \
              ArtifactPrefix=${{ env.ARTIFACT_PREFIX }} \
            --no-fail-on-empty-changeset

      - name: Deploy Frontend to S3 (Static Website)
        run: |
          aws s3 sync ./src/frontend s3://${{ env.S3_BUCKET }}/site/ \
            --delete \
            --exact-timestamps

      - name: Show recent stack events on failure
        if: failure()
        run: |
          aws cloudformation describe-stack-events \
            --stack-name ${{ env.STACK_NAME }} \
            --max-items 30 \
            --query 'StackEvents[].[Timestamp,LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason]' \
            --output table