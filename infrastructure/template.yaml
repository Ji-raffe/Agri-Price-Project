---
AWSTemplateFormatVersion: "2010-09-09"
Description: "Agri-Price Prediction ML Pipeline"

Resources:
  # ==========================================
  # EventBridge Rules (Schedules)
  # ========================================== 
  EventsRuleRuleagridailycuraterule:
    Type: "AWS::Events::Rule"
    Properties:
      Name: "agri-daily-curate-rule"
      EventBusName: "default"
      ScheduleExpression: "cron(40 14 * * ? *)"
      State: "ENABLED"
      Targets:
      - Id: "agri-curate-predictions-target"
        Arn: !GetAtt LambdaFunctionAgricuratepredictions.Arn
        RoleArn: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"

  EventsRuleRuleagridailymonitorrule:
    Type: "AWS::Events::Rule"
    Properties:
      Name: "agri-daily-monitor-rule"
      EventBusName: "default"
      ScheduleExpression: "cron(0 15 * * ? *)"
      State: "ENABLED"
      Targets:
      - Id: "agri-metrics-publisher-target"
        Arn: !GetAtt LambdaFunctionAgrimetricspublisher.Arn
        RoleArn: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"

  EventsRuleRuleagridailyweatheringest:
    Type: "AWS::Events::Rule"
    Properties:
      Name: "agri-daily-weather-ingest"
      EventBusName: "default"
      ScheduleExpression: "cron(10 13 * * ? *)"
      State: "ENABLED"
      Targets:
      - Id: "lambda-ingest-weather-target"
        Arn: !GetAtt LambdaFunctionLambdaingestweather.Arn
        RetryPolicy:
          MaximumRetryAttempts: 2
        RoleArn: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"

  EventsRuleRuleagridailypricesingest:
    Type: "AWS::Events::Rule"
    Properties:
      Name: "agri-daily-prices-ingest"
      EventBusName: "default"
      ScheduleExpression: "cron(0 13 * * ? *)"
      State: "ENABLED"
      Targets:
      - Id: "lambda-ingest-prices-target"
        Arn: !GetAtt LambdaFunctionLambdaingestprices.Arn
        RetryPolicy:
          MaximumRetryAttempts: 2
        RoleArn: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"

  EventsRuleRuleagridailyinferencerule:
    Type: "AWS::Events::Rule"
    Properties:
      Name: "agri-daily-inference-rule"
      EventBusName: "default"
      ScheduleExpression: "cron(20 14 * * ? *)"
      State: "ENABLED"
      Targets:
      - Id: "agri-daily-inference-target"
        Arn: !GetAtt LambdaFunctionAgridailyinference.Arn
        RoleArn: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"

  EventsRuleRuleagriretrainondriftrule:
    Type: "AWS::Events::Rule"
    Properties:
      Name: "agri-retrain-on-drift-rule"
      EventBusName: "default"
      EventPattern:
        detail-type:
        - "CloudWatch Alarm State Change"
        source:
        - "aws.cloudwatch"
        detail:
          alarmName:
          - "agri-overall-mape-alarm"
          state:
            value:
            - "ALARM"
      State: "ENABLED"
      Targets:
      - Id: "agri-retrain-workflow-target"
        Arn: !GetAtt StepFunctionsStateMachineStateMachineagriretrainapprovalworkflow.Arn
        RoleArn: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"

  EventsRuleRuleagridailygluejob:
    Type: "AWS::Events::Rule"
    Properties:
      Name: "agri-daily-glue-job"
      EventBusName: "default"
      ScheduleExpression: "cron(30 0 * * ? *)"
      State: "DISABLED"
      Targets:
      - Id: "agri-start-glue-transform-target"
        Arn: !GetAtt LambdaFunctionAgristartgluetransform.Arn
        RoleArn: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"

  # ==========================================
  # Lambda Functions
  # ==========================================
  LambdaFunctionAgristoretasktoken:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName: "agri-store-task-token"
      Handler: "lambda_function.lambda_handler"
      Runtime: "python3.14"
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole" 
      MemorySize: 128
      Timeout: 3
      Code: ../src/backend/agri-store-task-token
      Environment:
        Variables:
          TABLE_NAME: "agri-retrain-approvals"
          

  LambdaFunctionAgrisendapprovalrequest:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName: "agri-send-approval-request"
      Handler: "lambda_function.lambda_handler"
      Runtime: "python3.14"
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole" 
      MemorySize: 128
      Timeout: 3
      Code: ../src/backend/send_approval_request
      Environment:
        Variables:
          TOPIC_ARN: !Ref SNSTopicAgriretrainapprovaltopic
          APPROVAL_BASE_URL: !Sub "https://${AgriApprovalHttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod/decision"
          TABLE_NAME: "agri-retrain-approvals"

  LambdaFunctionAgrimetricspublisher:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName: "agri-metrics-publisher"
      Handler: "lambda_function.lambda_handler"
      Runtime: "python3.14"
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole" 
      MemorySize: 128
      Timeout: 63
      Code: ../src/backend/agri-metrics-publisher
      Environment:
        Variables:
          ATHENA_TIMEOUT_SECONDS: "120"
          CLOUDWATCH_NAMESPACE: "AgriPriceML"
          ATHENA_OUTPUT_S3: "s3://agri-price-dev-raw-project/athena-results/"
          ATHENA_WORKGROUP: "primary"
          ATHENA_DATABASE: "agri_mlops"
          ATHENA_POLL_SECONDS: "2"
          MODEL_PACKAGE_GROUP: "agri-price-multi-output"

  LambdaFunctionLambdaingestweather:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName: "lambda_ingest_weather"
      Handler: "lambda_function.lambda_handler"
      Runtime: "python3.14"
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      MemorySize: 128
      Timeout: 63
      Code: ../src/backend/ingest_weather
      Environment:
        Variables:
          RAW_BUCKET: "agri-price-dev-raw-project"
          ENV_NAME: "dev"
          WEATHER_API_TIMEOUT: "30"
          WEATHER_API_URL: "https://archive-api.open-meteo.com/v1/archive"
          PROJECT_NAME: "agri-price"
      Layers:
      - "arn:aws:lambda:us-east-1:336392948345:layer:AWSSDKPandas-Python314:2"

  LambdaFunctionAgristartgluetransform:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName: "agri-start-glue-transform"
      Handler: "lambda_function.lambda_handler"
      Runtime: "python3.14"
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole" 
      MemorySize: 128
      Timeout: 63
      Code: ../src/backend/agri-start-glue-transform
      Environment:
        Variables:
          GLUE_JOB_NAME: "agri-price-dev-phase-b"

  LambdaFunctionAgriapprovaldecision:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName: "agri-approval-decision"
      Handler: "lambda_function.lambda_handler"
      Runtime: "python3.14"
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole" 
      MemorySize: 128
      Timeout: 3
      Code: ../src/backend/agri-approval-decision
      Environment:
        Variables:
          TABLE_NAME: "agri-retrain-approvals"

  LambdaFunctionAgricuratepredictions:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName: "agri-curate-predictions"
      Handler: "lambda_function.lambda_handler"
      Runtime: "python3.14"
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole" 
      MemorySize: 128
      Timeout: 63
      Code: ../src/backend/agri-curate-predictions
      Environment:
        Variables:
          RAW_BASE: "predictions/raw/"
          META_BASE: "inference/input/"
          CURATED_BASE: "predictions/curated/"
          MODEL_PACKAGE_GROUP: "agri-price-multi-output"
          BUCKET: "agri-price-dev-raw-project"
      Layers:
      - "arn:aws:lambda:us-east-1:336392948345:layer:AWSSDKPandas-Python314:2"

  LambdaFunctionLambdaingestprices:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName: "lambda_ingest_prices"
      Handler: "lambda_function.lambda_handler"
      Runtime: "python3.14"
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole" 
      MemorySize: 128
      Timeout: 300
      Code: ../src/backend/ingest_prices
      Environment:
        Variables:
          PRICE_API_URL: "https://dataapi.moc.go.th/gis-product-prices"
          SOURCE_TIMEZONE: "Asia/Bangkok"
          PRODUCT_IDS: "P13087, P13083, P13043, P13002, P14001"
          LOOKBACK_DAYS: "1"
          RAW_BUCKET: "agri-price-dev-raw-project"
          ENV_NAME: "dev"
          PRICE_API_TIMEOUT: "90"
          PROJECT_NAME: "agri-price"
      Layers:
      - "arn:aws:lambda:us-east-1:336392948345:layer:AWSSDKPandas-Python314:2"

  LambdaFunctionAgristartretraining:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName: "agri-start-retraining"
      Handler: "lambda_function.lambda_handler"
      Runtime: "python3.14"
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole" 
      MemorySize: 128
      Timeout: 63
      Code: ../src/backend/agri-start-retraining
      Environment:
        Variables:
          FEATURES_S3_URI: "s3://agri-price-dev-raw-project/processed/features/"
          TARGET_COLUMNS: "target_next_day_price_coriander,target_next_day_price_kale,target_next_day_price_lime,target_next_day_price_orange,target_next_day_price_red_chili"
          PIPELINE_NAME: "agri-price-train-evaluate-register"

  LambdaFunctionAgridailyinference:
    Type: "AWS::Lambda::Function"
    Properties:
      FunctionName: "agri-daily-inference"
      Handler: "lambda_function.lambda_handler"
      Runtime: "python3.14"
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole" 
      MemorySize: 128
      Timeout: 63
      Code: ../src/backend/agri-daily-inference
      Environment:
        Variables:
          SAGEMAKER_EXEC_ROLE_ARN: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
          OUTPUT_S3_URI_TEMPLATE: "s3://agri-price-dev-raw-project/predictions/raw/run_date={run_date}/"
          INSTANCE_COUNT: "1"
          INSTANCE_TYPE: "ml.m5.large"
          MODEL_PACKAGE_GROUP: "agri-price-multi-output"
          INPUT_S3_URI_TEMPLATE: "s3://agri-price-dev-raw-project/inference/input/run_date={run_date}/payload/"

  # ==========================================
  # Step Functions Workflow
  # ==========================================
  StepFunctionsStateMachineStateMachineagriretrainapprovalworkflow:
    Type: "AWS::StepFunctions::StateMachine"
    Properties:
      StateMachineName: "agri-retrain-approval-workflow"
      RoleArn: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      StateMachineType: "STANDARD"
      DefinitionString: "{\"Comment\":\"Human-in-the-loop approval before retraining\",\"StartAt\":\"AddExecutionArn\",\"States\":{\"AddExecutionArn\":{\"Type\":\"Pass\",\"Parameters\":{\"execution_arn.$\":\"$$.Execution.Id\"},\"ResultPath\":\"$.meta\",\"Next\":\"SendApprovalRequest\"},\"SendApprovalRequest\":{\"Type\":\"Task\",\"Resource\":\"arn:aws:states:::lambda:invoke\",\"Parameters\":{\"FunctionName\":\"agri-send-approval-request\",\"Payload\":{\"execution_arn.$\":\"$.meta.execution_arn\"}},\"ResultPath\":\"$.approval\",\"Next\":\"StoreTaskToken\"},\"StoreTaskToken\":{\"Type\":\"Task\",\"Resource\":\"arn:aws:states:::lambda:invoke.waitForTaskToken\",\"Parameters\":{\"FunctionName\":\"agri-store-task-token\",\"Payload\":{\"token.$\":\"$.approval.Payload.token\",\"task_token.$\":\"$$.Task.Token\"}},\"TimeoutSeconds\":86400,\"ResultPath\":\"$.decision\",\"Next\":\"ApprovedChoice\"},\"ApprovedChoice\":{\"Type\":\"Choice\",\"Choices\":[{\"Variable\":\"$.decision.approved\",\"BooleanEquals\":true,\"Next\":\"StartRetraining\"}],\"Default\":\"Rejected\"},\"StartRetraining\":{\"Type\":\"Task\",\"Resource\":\"arn:aws:states:::lambda:invoke\",\"Parameters\":{\"FunctionName\":\"agri-start-retraining\",\"Payload\":{}},\"End\":true},\"Rejected\":{\"Type\":\"Fail\",\"Error\":\"ApprovalRejected\",\"Cause\":\"Retraining rejected by admin\"}}}"


  # ==========================================
  # AWS Glue Job
  # ==========================================
  GlueJobPhaseB:
    Type: "AWS::Glue::Job"
    Properties:
      Name: "agri-price-dev-phase-b"
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Description: "Data transformation job for Agri-Price"
      GlueVersion: "3.0"
      MaxCapacity: 1     
      Command:
        Name: "pythonshell" 
        ScriptLocation: !Sub "s3://${S3BucketAgripricedevraw}/scripts/agri-price-dev-phase-b.py"
        PythonVersion: "3.9"
      DefaultArguments:
        "--job-language": "python"
        "--TempDir": !Sub "s3://${S3BucketAgripricedevraw}/temp/glue/"        
        "--raw-bucket": !Ref S3BucketAgripricedevraw
        "--price-prefix": "raw/prices/"
        "--weather-prefix": "raw/weather/"
        "--processed-bucket": !Ref S3BucketAgripricedevraw
        "--processed-prefix": "processed/"

  # ==========================================
  # Notifications & Alarms (SNS / CloudWatch)
  # ==========================================
  SNSTopicAgriretrainapprovaltopic:
    Type: "AWS::SNS::Topic"
    Properties:
      TopicName: "agri-retrain-approval-topic"
      Subscription:
      - Endpoint: " " #email
        Protocol: "email"

  CloudWatchAlarmAgrioverallmapealarm:
    Type: "AWS::CloudWatch::Alarm"
    Properties:
      AlarmName: "agri-overall-mape-alarm"
      AlarmDescription: "Trigger retraining when drift exceeds threshold"
      Namespace: "AgriPriceML"
      MetricName: "OverallMAPE"
      Statistic: "Average"
      ComparisonOperator: "GreaterThanThreshold"
      Threshold: 12
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      TreatMissingData: "ignore"
      Dimensions:
      - Name: "ModelPackageGroup"
        Value: "agri-price-multi-output"

  # ==========================================
  # API Gateway (HTTP API)
  # ==========================================
  AgriApprovalHttpApi:
    Type: "AWS::ApiGatewayV2::Api"
    Properties:
      Name: "agri-approval-api"
      ProtocolType: "HTTP"

  AgriApprovalApiIntegration:
    Type: "AWS::ApiGatewayV2::Integration"
    Properties:
      ApiId: !Ref AgriApprovalHttpApi
      IntegrationType: "AWS_PROXY"
      IntegrationUri: !GetAtt LambdaFunctionAgriapprovaldecision.Arn
      PayloadFormatVersion: "2.0"

  AgriApprovalApiRoute:
    Type: "AWS::ApiGatewayV2::Route"
    Properties:
      ApiId: !Ref AgriApprovalHttpApi
      RouteKey: "ANY /decision" 
      Target: !Join [ "/", [ "integrations", !Ref AgriApprovalApiIntegration ] ]

  AgriApprovalApiStage:
    Type: "AWS::ApiGatewayV2::Stage"
    Properties:
      ApiId: !Ref AgriApprovalHttpApi
      StageName: "prod"
      AutoDeploy: true

  # ==========================================
  # API Gateway, S3 & Athena
  # ==========================================
  S3BucketAgripricedevraw:
    Type: "AWS::S3::Bucket"
    Properties:
      BucketName: "agri-price-dev-raw-project"
      OwnershipControls:
        Rules:
        - ObjectOwnership: "BucketOwnerEnforced"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - BucketKeyEnabled: true
          ServerSideEncryptionByDefault:
            SSEAlgorithm: "AES256"
      VersioningConfiguration:
        Status: "Enabled"
      WebsiteConfiguration:
        IndexDocument: "index.html"
      CorsConfiguration:
        CorsRules:
        - MaxAge: 3000
          AllowedMethods: ["GET", "HEAD"]
          AllowedOrigins: 
            - !Sub "http://agri-price-dev-raw-project.s3-website-${AWS::Region}.amazonaws.com"
          AllowedHeaders: ["*"]

  S3BucketPolicyAgripricedevraw:
    Type: "AWS::S3::BucketPolicy"
    Properties:
      Bucket: !Ref S3BucketAgripricedevraw
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
        - Sid: "PublicReadWebsiteFiles"
          Effect: "Allow"
          Principal: "*"
          Action: "s3:GetObject"
          Resource: !Sub "arn:aws:s3:::${S3BucketAgripricedevraw}/site/*"
        - Sid: "PublicReadLatestPredictions"
          Effect: "Allow"
          Principal: "*"
          Action: "s3:GetObject"
          Resource: !Sub "arn:aws:s3:::${S3BucketAgripricedevraw}/predictions/curated/latest/*"

  AthenaWorkGroupPrimary:
    Type: "AWS::Athena::WorkGroup"
    Properties:
      Name: "agri-primary-workgroup"
      State: "ENABLED"
      WorkGroupConfiguration:
        PublishCloudWatchMetricsEnabled: true
        EnforceWorkGroupConfiguration: false

  # ==========================================
  # Permissions (EventBridge to Lambda)
  # ==========================================
  LambdaPermissionFunctionlambdaingestweather:
    Type: "AWS::Lambda::Permission"
    Properties:
      FunctionName: !GetAtt LambdaFunctionLambdaingestweather.Arn
      Action: "lambda:InvokeFunction"
      Principal: "events.amazonaws.com"

  LambdaPermissionFunctionagriapprovaldecision:
    Type: "AWS::Lambda::Permission"
    Properties:
      FunctionName: !GetAtt LambdaFunctionAgriapprovaldecision.Arn
      Action: "lambda:InvokeFunction"
      Principal: "apigateway.amazonaws.com"
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${AgriApprovalHttpApi}/*/*/decision"

  LambdaPermissionFunctionlambdaingestprices:
    Type: "AWS::Lambda::Permission"
    Properties:
      FunctionName: !GetAtt LambdaFunctionLambdaingestprices.Arn
      Action: "lambda:InvokeFunction"
      Principal: "events.amazonaws.com"